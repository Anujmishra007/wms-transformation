---
# Secrets template for WMS Services
# NOTE: In production, use external secrets management (Vault, AWS Secrets Manager, etc.)
apiVersion: v1
kind: Secret
metadata:
  name: wms-db-secrets
  labels:
    app.kubernetes.io/name: wms
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Replace with actual values or use external secrets
  DB_USERNAME: "wms_user"
  DB_PASSWORD: "CHANGE_ME_IN_PRODUCTION"

---
apiVersion: v1
kind: Secret
metadata:
  name: wms-kafka-secrets
  labels:
    app.kubernetes.io/name: wms
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  KAFKA_SASL_USERNAME: "wms_kafka"
  KAFKA_SASL_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
