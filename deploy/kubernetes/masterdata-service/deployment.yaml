---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: masterdata-service
  labels:
    app.kubernetes.io/name: masterdata-service
    app.kubernetes.io/component: service
    app.kubernetes.io/part-of: wms
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: masterdata-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: masterdata-service
        app.kubernetes.io/component: service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8090"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: wms-service-account
      containers:
        - name: masterdata-service
          image: IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8090
              protocol: TCP
          env:
            - name: SERVER_PORT
              value: "8090"
            - name: SPRING_APPLICATION_NAME
              value: "masterdata-service"
          envFrom:
            - configMapRef:
                name: wms-common-config
            - secretRef:
                name: wms-db-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8090
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8090
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: masterdata-service
  labels:
    app.kubernetes.io/name: masterdata-service
spec:
  type: ClusterIP
  ports:
    - port: 8090
      targetPort: 8090
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: masterdata-service

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: masterdata-service-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: masterdata-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
