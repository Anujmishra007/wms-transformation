# Docker Compose for running all WMS microservices locally
# Usage: docker-compose -f docker-compose.yml -f docker-compose.services.yml up -d

version: '3.8'

services:
  # ============== Core Services ==============

  inventory-service:
    build:
      context: .
      dockerfile: deploy/docker/inventory-service/Dockerfile
    image: wms/inventory-service:latest
    container_name: wms-inventory-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://mssql:1433;databaseName=WMS;encrypt=false
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=YourStrong@Passw0rd
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - TEMPORAL_SERVICE_ADDRESS=temporal:7233
    depends_on:
      - mssql
      - kafka
      - temporal
    networks:
      - wms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  inbound-service:
    build:
      context: .
      dockerfile: deploy/docker/inbound-service/Dockerfile
    image: wms/inbound-service:latest
    container_name: wms-inbound-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://mssql:1433;databaseName=WMS;encrypt=false
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=YourStrong@Passw0rd
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - TEMPORAL_SERVICE_ADDRESS=temporal:7233
    depends_on:
      - mssql
      - kafka
      - temporal
      - inventory-service
    networks:
      - wms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  outbound-service:
