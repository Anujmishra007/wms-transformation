    image: wms/printing-service:latest
    container_name: wms-printing-service
    ports:
      - "8091:8091"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://mssql:1433;databaseName=WMS;encrypt=false
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=YourStrong@Passw0rd
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
