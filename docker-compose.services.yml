      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://mssql:1433;databaseName=WMS;encrypt=false
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=YourStrong@Passw0rd
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - TEMPORAL_SERVICE_ADDRESS=temporal:7233
    depends_on:
      - mssql
      - kafka
      - temporal
      - inventory-service
    networks:
      - wms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  picking-service:
    build:
      context: .
      dockerfile: deploy/docker/picking-service/Dockerfile
    image: wms/picking-service:latest
    container_name: wms-picking-service
    ports:
      - "8089:8089"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://mssql:1433;databaseName=WMS;encrypt=false
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=YourStrong@Passw0rd
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - TEMPORAL_SERVICE_ADDRESS=temporal:7233
    depends_on:
      - mssql
      - kafka
      - temporal
      - inventory-service
      - outbound-service
    networks:
      - wms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8089/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  task-service:
    build:
      context: .
      dockerfile: deploy/docker/task-service/Dockerfile
    image: wms/task-service:latest
