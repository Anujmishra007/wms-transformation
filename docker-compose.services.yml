      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ============== API Gateway (Optional) ==============

  api-gateway:
    image: nginx:alpine
    container_name: wms-api-gateway
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - inventory-service
      - inbound-service
      - outbound-service
      - picking-service
      - task-service
      - masterdata-service
      - printing-service
    networks:
      - wms-network

networks:
  wms-network:
    external: true
    name: wms-network
