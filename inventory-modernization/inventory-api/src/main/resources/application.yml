spring:
  application:
    name: inventory-service

server:
  port: 8082

spring.datasource:
  url: jdbc:sqlserver://localhost:1433;databaseName=WMS;encrypt=false
  username: ${DB_USERNAME:sa}
  password: ${DB_PASSWORD:password}

spring.kafka:
  bootstrap-servers: localhost:9092

temporal:
  service-address: localhost:7233
  namespace: wms-inventory

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.maersk.wms: DEBUG
