# Full CI/CD Pipeline - Build All Services
name: Full Build & Deploy All Services

on:
  push:
    branches: [main]
    paths:
      - 'wms-shared-libs/**'
      - 'pom.xml'
  workflow_dispatch:
    inputs:
      deploy-all:
        description: 'Deploy all services'
        required: false
        type: boolean
        default: false
      environment:
        description: 'Target environment'
        required: false
        type: choice
        options:
          - dev
          - staging
          - prod
        default: 'dev'

jobs:
  build-shared-libs:
    name: Build Shared Libraries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build shared libraries
        run: |
          mvn clean install -pl wms-shared-libs -am -DskipTests -B

      - name: Upload shared libs
        uses: actions/upload-artifact@v4
        with:
          name: shared-libs
          path: ~/.m2/repository/com/maersk/wms/
          retention-days: 1

  build-services:
    name: Build All Services
    runs-on: ubuntu-latest
    needs: build-shared-libs
    strategy:
      matrix:
        service:
          - name: inventory-service
            module: inventory-modernization/inventory-app
            port: 8081
          - name: inbound-service
            module: inbound-modernization/inbound-api
            port: 8084
          - name: outbound-service
            module: outbound-modernization/outbound-api
            port: 8087
          - name: picking-service
            module: picking-modernization/picking-api
            port: 8089
          - name: task-service
            module: task-modernization/task-api
            port: 8092
          - name: masterdata-service
            module: masterdata-modernization/masterdata-api
            port: 8090
          - name: printing-service
            module: printing-service/printing-app
            port: 8091
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Download shared libs
        uses: actions/download-artifact@v4
        with:
          name: shared-libs
          path: ~/.m2/repository/com/maersk/wms/

      - name: Build ${{ matrix.service.name }}
        run: |
          mvn clean package -pl ${{ matrix.service.module }} -am -DskipTests -B

      - name: Run Tests for ${{ matrix.service.name }}
        run: |
          mvn test -pl ${{ matrix.service.module }} -am -B
        continue-on-error: true

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service.name }}-jar
          path: ${{ matrix.service.module }}/target/*.jar
          retention-days: 5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/${{ matrix.service.name }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.service.name }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}/${{ matrix.service.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-results:
    name: Aggregate Test Results
    runs-on: ubuntu-latest
    needs: build-services
    if: always()

    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          pattern: '*-test-results'
          merge-multiple: true

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: '**/TEST-*.xml'

  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    needs: build-services
    if: github.event.inputs.deploy-all == 'true' || github.ref == 'refs/heads/main'
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Deploy all services
        run: |
          NAMESPACE="wms-${{ github.event.inputs.environment || 'dev' }}"

          for service in inventory inbound outbound picking task masterdata printing; do
            echo "Deploying ${service}-service..."

            # Update image tag
            sed -i "s|IMAGE_TAG|ghcr.io/${{ github.repository }}/${service}-service:${{ github.sha }}|g" \
              deploy/kubernetes/${service}-service/deployment.yaml

            # Apply deployment
            kubectl apply -f deploy/kubernetes/${service}-service/ -n $NAMESPACE
          done

      - name: Verify all deployments
        run: |
          NAMESPACE="wms-${{ github.event.inputs.environment || 'dev' }}"

          for service in inventory inbound outbound picking task masterdata printing; do
            kubectl rollout status deployment/${service}-service -n $NAMESPACE --timeout=300s
          done
