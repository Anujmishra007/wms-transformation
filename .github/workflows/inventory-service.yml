# CI/CD Pipeline for Inventory Service
name: Inventory Service CI/CD

on:
  push:
    branches: [main, develop, 'release/*']
    paths:
      - 'inventory-modernization/**'
      - 'wms-shared-libs/**'
      - '.github/workflows/inventory-service.yml'
      - '.github/workflows/reusable-build.yml'
      - 'pom.xml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'inventory-modernization/**'
      - 'wms-shared-libs/**'
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to environment'
        required: false
        type: boolean
        default: false
      environment:
        description: 'Target environment'
        required: false
        type: choice
        options:
          - dev
          - staging
          - prod
        default: 'dev'

jobs:
  build-and-deploy:
    name: Inventory Service
    uses: ./.github/workflows/reusable-build.yml
    with:
      service-name: inventory-service
      service-module: inventory-modernization/inventory-app
      port: '8081'
      java-version: '17'
      run-tests: true
      push-image: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      deploy: ${{ github.event.inputs.deploy == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
      environment: ${{ github.event.inputs.environment || 'dev' }}
    secrets: inherit

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: wms
          POSTGRES_PASSWORD: wms_test
          POSTGRES_DB: wms_inventory
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      kafka:
        image: confluentinc/cp-kafka:7.4.0
        ports:
          - 9092:9092
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Karate E2E Tests
        run: |
          mvn test -pl inventory-modernization/inventory-test \
            -Dkarate.options="--tags @integration" \
            -Dtest.db.url=jdbc:postgresql://localhost:5432/wms_inventory \
            -B
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: inventory-modernization/inventory-test/target/karate-reports/
