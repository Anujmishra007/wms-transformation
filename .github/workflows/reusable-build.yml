# Reusable workflow for building and deploying WMS microservices
name: Reusable Build & Deploy

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
        description: 'Name of the service (e.g., inventory-modernization)'
      service-module:
        required: true
        type: string
        description: 'Maven module path for the deployable app'
      port:
        required: true
        type: string
        description: 'Service port number'
      java-version:
        required: false
        type: string
        default: '17'
        description: 'Java version'
      run-tests:
        required: false
        type: boolean
        default: true
        description: 'Whether to run tests'
      push-image:
        required: false
        type: boolean
        default: true
        description: 'Whether to push Docker image'
      deploy:
        required: false
        type: boolean
        default: false
        description: 'Whether to deploy to Kubernetes'
      environment:
        required: false
        type: string
        default: 'dev'
        description: 'Target deployment environment'
    secrets:
      DOCKER_USERNAME:
        required: false
      DOCKER_PASSWORD:
        required: false
      KUBE_CONFIG:
        required: false
      SONAR_TOKEN:
        required: false

env:
  MAVEN_OPTS: -Xmx1024m -XX:MaxMetaspaceSize=512m
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/${{ inputs.service-name }}

jobs:
  build:
    name: Build ${{ inputs.service-name }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Extract version
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout -pl ${{ inputs.service-module }})
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Build with Maven
        run: |
          mvn clean package -pl ${{ inputs.service-module }} -am \
            -DskipTests=${{ inputs.run-tests == false }} \
            -B -V

      - name: Run Tests
        if: inputs.run-tests
        run: |
          mvn test -pl ${{ inputs.service-module }} -am -B

      - name: Upload test results
        if: inputs.run-tests && always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ inputs.service-name }}
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.service-name }}-jar
          path: ${{ inputs.service-module }}/target/*.jar
          retention-days: 5

      - name: Set up Docker Buildx
        if: inputs.push-image
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: inputs.push-image
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: inputs.push-image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Build and push Docker image
        if: inputs.push-image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/${{ inputs.service-name }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SERVICE_MODULE=${{ inputs.service-module }}
            SERVICE_PORT=${{ inputs.port }}
            JAR_FILE=${{ inputs.service-module }}/target/*.jar

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build
    if: inputs.run-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: maven

      - name: SonarQube Scan
        if: secrets.SONAR_TOKEN != ''
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -pl ${{ inputs.service-module }} -am \
            -Dsonar.projectKey=wms-${{ inputs.service-name }} \
            -Dsonar.organization=maersk \
            -Dsonar.host.url=https://sonarcloud.io \
            -B

  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: build
    if: inputs.deploy && github.ref == 'refs/heads/main'
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure Kubernetes
        if: secrets.KUBE_CONFIG != ''
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Deploy to Kubernetes
        run: |
          # Update image tag in deployment
          sed -i "s|IMAGE_TAG|${{ needs.build.outputs.image-tag }}|g" \
            deploy/kubernetes/${{ inputs.service-name }}/deployment.yaml

          # Apply Kubernetes manifests
          kubectl apply -f deploy/kubernetes/${{ inputs.service-name }}/ \
            -n wms-${{ inputs.environment }}

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/${{ inputs.service-name }} \
            -n wms-${{ inputs.environment }} \
            --timeout=300s
