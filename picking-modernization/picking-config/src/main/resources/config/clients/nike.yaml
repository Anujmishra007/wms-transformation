# Nike Client Configuration for FN839 Picking
client:
  code: NIKE
  name: Nike Inc.

features:
  serial_tracking: true
  lot_control: true
  weight_capture: false
  multi_lpn_pick: true
  voice_picking: true
  cluster_picking: true

plugins:
  enabled:
    - nike-gettask-priority
    - nike-decode-custom
    - nike-confirm-serial
  disabled:
    - standard-decode

barcode:
  sku_format: "NK[0-9]{6}"
  location_format: "[A-Z][0-9]{2}-[0-9]{2}-[0-9]{2}"
  lpn_format: "LP[0-9]{10}"

rules:
  short_pick:
    min_fill_rate: 0.9
    require_approval_below: 0.5
    allow_zero_pick: false
  priority:
    rush_threshold: 90
    standard_base: 50

settings:
  default_zone_assignment: NEAREST
  max_tasks_per_user: 10
  task_timeout_minutes: 30
  enable_parity_testing: true
